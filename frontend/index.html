<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Day Plan</title><link rel="stylesheet" href="./style.css">
</head>
<body>
<main class="shell" id="app">

<section class="hero">
  <p class="eyebrow">Day Plan</p>
  <h1>一个入口，收住每周方向和每天动作</h1>
  <p class="subtitle">最少点击 · 逐条操作 · 昨日继承 · 周任务联动</p>
</section>

<!-- Toast -->
<div v-if="toast" style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;background:var(--text);color:#fff;padding:12px 24px;border-radius:999px;font-weight:700;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.15);">{{ toast }}</div>

<week-nav :wk="wk" :week-opts="weekOpts"
  @switch-week="onSwitchWeek" @create-week="createNext"></week-nav>

<week-plan :week-data="w"
  @save="onSaveWeek" @promote-temp="onPromoteTemp"></week-plan>

<day-tabs :days="weekDays" :selected-day="day" :day-statuses="dayStatuses"
  @switch-day="onSwitchDay"></day-tabs>

<yesterday-ref :wk="wk" :day="day"
  @inherit="onInheritYesterday"></yesterday-ref>

<task-pool :tasks="tasks"
  @toggle="onToggleTask" @delete="onDeleteTask"
  @add="onAddTask" @reorder="onReorderTasks"
  @add-to-focus="onAddTaskToFocus"></task-pool>

<daily-focus :focus="focus" :day-saved="daySaved"
  @save="saveDay" @move="onMoveFocus"
  @reorder="saveDay" @add="focus.push('');saveDay()"></daily-focus>

<daily-review :done-items="doneItems" :mig-items="migItems"
  :drop-items="dropItems" :interrupt="interrupt"
  :next-items="nextItems" :closed="closed" :day-saved="daySaved"
  @save="saveDay" @close="onQuickClose"
  @update:interrupt="interrupt=$event"></daily-review>

<week-review :wk="wk" :review-text="reviewText"
  @save="onSaveReview" @generate="genReview" @export="exportWeek"></week-review>

</main>

<script src="vendor/vue.global.prod.js"></script>
<script src="vendor/Sortable.min.js"></script>
<script src="composables/useKeyboard.js"></script>
<script src="composables/useDragSort.js"></script>
<script src="components/WeekNav.js"></script>
<script src="components/WeekPlan.js"></script>
<script src="components/DayTabs.js"></script>
<script src="components/YesterdayRef.js"></script>
<script src="components/TaskPool.js"></script>
<script src="components/DailyFocus.js"></script>
<script src="components/DailyReview.js"></script>
<script src="components/WeekReview.js"></script>
<script>
const A = '/api';
const $ = {
  get: async (u) => { const r = await fetch(A + u); return r.json(); },
  post: async (u, b) => { const r = await fetch(A + u, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) }); return r.json(); },
  put: async (u, b) => { const r = await fetch(A + u, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) }); return r.json(); },
  del: async (u) => { const r = await fetch(A + u, { method: 'DELETE' }); return r.json(); },
};

function ts() { return new Date().toISOString().split('T')[0]; }
function wkKey(d) {
  d = new Date(d); const n = d.getUTCDay() || 7; d.setUTCDate(d.getUTCDate() + 4 - n);
  const ys = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return 'WK' + Math.ceil((((d - ys) / 86400000) + 1) / 7);
}
function wkDays(wk) {
  let m;
  if (wk) {
    const n = parseInt(wk.replace('WK', '')), y = new Date().getFullYear();
    const j4 = new Date(Date.UTC(y, 0, 4)), j4d = j4.getUTCDay() || 7;
    m = new Date(Date.UTC(y, 0, 4 - j4d + 1)); m.setUTCDate(m.getUTCDate() + (n - 1) * 7);
  } else {
    m = new Date(); const dow = m.getDay(); m.setDate(m.getDate() + (dow === 0 ? -6 : 1 - dow));
  }
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(m); d.setDate(m.getDate() + i); const s = d.toISOString().split('T')[0];
    return { date: s, label: ['周一','周二','周三','周四','周五','周六','周日'][i], today: s === ts() };
  });
}

const app = Vue.createApp({
  data() {
    return {
      wk: wkKey(new Date()), day: ts(),
      w: { '本周主线': '', '本周必须完成': '', '本周推进即可': '', '临时进入': '' },
      focus: [''], temp: [], doneItems: [], migItems: [], dropItems: [],
      interrupt: '', nextItems: [''], closed: false,
      tasks: [], reviewText: '', weekOpts: [],
      dayStatuses: {},
      savingWeek: false, savingDay: false, weekSaved: false, daySaved: false,
      toast: '', autoSaveTimer: null,
    };
  },
  computed: { weekDays() { return wkDays(this.wk); } },

  async mounted() {
    await this.refreshOpts();
    await this.loadAll();
    this._kbCleanup = useKeyboard({
      'ArrowLeft': () => this.shiftDay(-1),
      'ArrowRight': () => this.shiftDay(1),
      'Ctrl+S': () => { this.saveDay(); this.onSaveWeek(this.w); },
      'Ctrl+Enter': () => this.onQuickClose(),
      'Ctrl+N': () => { this.focus.push(''); this.saveDay(); },
      'Ctrl+I': () => this.onInheritYesterday(),
    });
  },
  beforeUnmount() { if (this._kbCleanup) this._kbCleanup(); },

  methods: {
    /* ── 周导航 ── */
    async refreshOpts() {
      try {
        const r = await $.get('/weeks?page_size=50');
        if (r.code === 0 && r.data?.items) {
          const num = parseInt(this.wk.replace('WK', ''));
          const want = [];
          for (let i = num - 2; i <= num + 2; i++) {
            const k = 'WK' + i;
            if (!want.find(w => w.key === k)) want.push({ key: k });
          }
          this.weekOpts = want;
        }
      } catch (e) {}
    },
    onSwitchWeek(val) {
      if (typeof val === 'number') {
        const cur = this.weekOpts.findIndex(w => w.key === this.wk);
        const nxt = this.weekOpts[cur + val];
        if (nxt) val = nxt.key; else return;
      }
      this.wk = val; this.loadAll().then(() => this.refreshOpts());
    },
    async createNext() {
      const d = new Date(); d.setDate(d.getDate() + 7);
      const n = wkKey(d);
      try { await $.get('/weeks/' + n); } catch (e) {}
      await this.refreshOpts();
      this.wk = n; await this.loadAll();
    },

    /* ── 数据加载 ── */
    async loadAll() {
      await Promise.all([this.loadWeek(), this.loadTasks(), this.loadReview(), this.loadDayStatuses()]);
      const ds = this.weekDays;
      this.day = ds.find(d => d.today)?.date || ds[0].date;
      await this.loadDay();
    },
    async loadWeek() {
      try {
        const r = await $.get('/weeks/' + this.wk);
        if (r.code === 0 && r.data) Object.assign(this.w, {
          '本周主线': r.data['本周主线'] || '',
          '本周必须完成': r.data['本周必须完成'] || '',
          '本周推进即可': r.data['本周推进即可'] || '',
          '临时进入': r.data['临时进入'] || '',
        });
      } catch (e) {}
    },
    async loadDay() {
      this.focus = ['']; this.temp = []; this.doneItems = []; this.migItems = [];
      this.dropItems = []; this.interrupt = ''; this.nextItems = ['']; this.closed = false;
      try {
        const r = await $.get('/weeks/' + this.wk + '/days/' + this.day);
        if (r.code === 0 && r.data) {
          const f = r.data;
          this.focus = (f['今日重点'] || '').split('\n').filter(l => l.trim());
          this.temp = (f['临时插入'] || '').split('\n').filter(l => l.trim());
          this.doneItems = (f['收尾_完成'] || '').split('\n').filter(l => l.trim());
          this.migItems = (f['收尾_迁移'] || '').split('\n').filter(l => l.trim());
          this.dropItems = (f['收尾_搁置放弃'] || '').split('\n').filter(l => l.trim());
          this.interrupt = f['主要打断'] || '';
          this.nextItems = (f['明日优先'] || '').split('\n').filter(l => l.trim());
          this.closed = f['收尾状态'] === '已收尾';
        }
        if (!this.focus.length) this.focus = [''];
        if (!this.nextItems.length) this.nextItems = [''];
        this.startAutoSave();
      } catch (e) {}
    },
    async loadDayStatuses() {
      try {
        const r = await $.get('/weeks/' + this.wk + '/days');
        if (r.code === 0 && r.data) {
          const map = {};
          for (const d of r.data) {
            const dateMs = d['日期'];
            if (!dateMs) continue;
            const dateStr = new Date(dateMs).toISOString().split('T')[0];
            if (d['收尾状态'] === '已收尾') map[dateStr] = 'closed';
            else if (d['今日重点'] || d['临时插入']) map[dateStr] = 'content';
          }
          this.dayStatuses = map;
        }
      } catch (e) {}
    },
    async loadTasks() {
      try {
        const r = await $.get('/weeks/' + this.wk + '/tasks');
        if (r.code === 0) this.tasks = r.data || [];
      } catch (e) {}
    },
    async loadReview() {
      try {
        const r = await $.get('/weeks/' + this.wk);
        if (r.code === 0 && r.data?.['本周总结']) this.reviewText = r.data['本周总结'];
      } catch (e) {}
    },

    /* ── 日期切换 ── */
    shiftDay(dir) {
      const idx = this.weekDays.findIndex(d => d.date === this.day);
      const nxt = this.weekDays[idx + dir];
      if (nxt) this.onSwitchDay(nxt.date);
    },
    async onSwitchDay(date) { this.day = date; await this.loadDay(); },

    /* ── 周计划保存 ── */
    async onSaveWeek(payload) {
      this.savingWeek = true; this.weekSaved = false;
      try { await $.put('/weeks/' + this.wk, payload); this.weekSaved = true; setTimeout(() => this.weekSaved = false, 2000); } catch (e) {}
      this.savingWeek = false;
    },

    /* ── 日计划保存 ── */
    async saveDay() {
      if (this._saving) return; this._saving = true; this.savingDay = true; this.daySaved = false;
      try {
        await $.put('/weeks/' + this.wk + '/days/' + this.day, {
          '今日重点': this.focus.filter(s => s.trim()).join('\n'),
          '临时插入': this.temp.filter(s => s.trim()).join('\n'),
          '收尾_完成': this.doneItems.filter(s => s.trim()).join('\n'),
          '收尾_迁移': this.migItems.filter(s => s.trim()).join('\n'),
          '收尾_搁置放弃': this.dropItems.filter(s => s.trim()).join('\n'),
          '主要打断': this.interrupt,
          '明日优先': this.nextItems.filter(s => s.trim()).join('\n'),
        });
        this.daySaved = true; setTimeout(() => this.daySaved = false, 2000);
      } catch (e) {}
      this._saving = false; this.savingDay = false;
    },

    /* ── 自动保存 ── */
    startAutoSave() { clearInterval(this.autoSaveTimer); this.autoSaveTimer = setInterval(() => { this.saveDay(); this.onSaveWeek(this.w); }, 60000); },

    /* ── 任务操作 ── */
    async onToggleTask(t) {
      t['完成状态'] = !t['完成状态'];
      try {
        await $.put('/weeks/' + this.wk + '/tasks/' + t.record_id, { '完成状态': t['完成状态'] });
        if (t['完成状态']) {
          this.doneItems.push(t['任务内容']);
          this.saveDay();
          this.toast = '✅ 已标记完成'; setTimeout(() => this.toast = '', 1500);
        }
      } catch (e) { t['完成状态'] = !t['完成状态']; }
    },
    async onDeleteTask(id) { await $.del('/weeks/' + this.wk + '/tasks/' + id); await this.loadTasks(); },
    async onAddTask({ content, task_type }) {
      await $.post('/weeks/' + this.wk + '/tasks', { content, task_type });
      await this.loadTasks();
    },
    async onReorderTasks(ids) {
      try { await $.put('/weeks/' + this.wk + '/tasks/reorder', {task_ids: ids}); } catch (e) {}
    },
    onAddTaskToFocus(text) {
      if (!this.focus.includes(text)) {
        if (this.focus[0] === '') this.focus[0] = text;
        else this.focus.push(text);
        this.saveDay();
      }
    },

    /* ── 今日重点操作 ── */
    onMoveFocus({ item, target }) {
      if (target === 'done') { this.doneItems.push(item); this.toast = '✅ 已归入完成区'; }
      else if (target === 'migrated') { this.migItems.push(item); this.toast = '➡️ 已归入迁移区'; }
      this.saveDay();
      setTimeout(() => this.toast = '', 1500);
    },

    /* ── 收尾 ── */
    async onQuickClose() {
      const remain = this.focus.filter(s => s.trim());
      if (remain.length) { this.doneItems.push(...remain); this.focus = ['']; }
      await this.saveDay();
      try {
        await $.post('/weeks/' + this.wk + '/days/' + this.day + '/close');
        this.closed = true;
        this.dayStatuses[this.day] = 'closed';
        this.toast = '🎉 收尾完成！'; setTimeout(() => this.toast = '', 2000);
      } catch (e) {}
    },

    /* ── 昨日继承 ── */
    async onInheritYesterday(items) {
      if (!items || !items.length) {
        const d = new Date(this.day + 'T00:00:00'); d.setDate(d.getDate() - 1);
        const yd = d.toISOString().split('T')[0];
        try {
          const r = await $.get('/weeks/' + this.wk + '/days/' + yd);
          if (r.code === 0 && r.data) {
            const f = r.data;
            items = [];
            if (f['明日优先']) items.push(...(f['明日优先'] || '').split('\n').filter(s => s.trim()));
            if (f['收尾_迁移']) items.push(...(f['收尾_迁移'] || '').split('\n').filter(s => s.trim()));
          }
        } catch (e) { return; }
      }
      for (const item of items) {
        if (item.trim() && !this.focus.includes(item)) {
          if (this.focus[0] === '') this.focus[0] = item;
          else this.focus.push(item);
        }
      }
      if (this.focus[0] === '') this.focus = [''];
      this.saveDay();
      this.toast = '📥 已继承昨日'; setTimeout(() => this.toast = '', 1500);
    },

    /* ── 临时进入 → 任务 ── */
    async onPromoteTemp(lines) {
      for (const l of lines) {
        try { await $.post('/weeks/' + this.wk + '/tasks', { content: l, task_type: '临时进入' }); } catch (e) {}
      }
      await this.loadTasks();
      this.toast = '📦 已批量创建为周任务'; setTimeout(() => this.toast = '', 1500);
    },

    /* ── 周复盘 ── */
    async genReview() {
      try {
        const [dr, wr] = await Promise.all([$.get('/weeks/' + this.wk + '/days'), $.get('/weeks/' + this.wk)]);
        const days = dr.code === 0 ? (dr.data || []) : [];
        const L = [];
        const week = wr.code === 0 ? (wr.data || {}) : {};
        if (week['本周主线']) L.push('## 本周主线\n' + week['本周主线']);
        L.push('## 每日完成');
        for (const d of days) { if (d['收尾_完成']?.trim()) L.push(d['星期'] + '：' + d['收尾_完成'].trim().replace(/\n/g, '；')); }
        const ints = days.filter(d => d['主要打断']?.trim()).map(d => d['星期'] + '：' + d['主要打断'].trim().replace(/\n/g, '；'));
        if (ints.length) L.push('## 风险与打断\n' + ints.join('\n'));
        this.reviewText = L.join('\n\n');
      } catch (e) {}
    },
    onSaveReview(text) { $.put('/weeks/' + this.wk, { '本周总结': text }); },
    exportWeek() { window.open('/api/weeks/' + this.wk + '/export', '_blank'); },
  },
});

app.component('WeekNav', WeekNav);
app.component('WeekPlan', WeekPlan);
app.component('DayTabs', DayTabs);
app.component('YesterdayRef', YesterdayRef);
app.component('TaskPool', TaskPool);
app.component('DailyFocus', DailyFocus);
app.component('DailyReview', DailyReview);
app.component('WeekReview', WeekReview);

app.mount('#app');
</script>
</body>
</html>
