server {
    listen 443 ssl;
    server_name 2566.online;

    ssl_certificate     /etc/letsencrypt/live/2566.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/2566.online/privkey.pem;

    # Basic Auth
    auth_basic "Weekly Board";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # 前端静态文件
    root /opt/weekly-board/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name 2566.online;
    return 301 https://$host$request_uri;
}
